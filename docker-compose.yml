services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: songdna
      POSTGRES_PASSWORD: songdna
      POSTGRES_DB: songdna
    ports:
      - "5432:5432"
    volumes:
      - songdna_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U songdna"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: ./apps/api
    command: ["node", "dist/migrate.js"]
    environment:
      DATABASE_URL: postgres://songdna:songdna@postgres:5432/songdna
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ./apps/api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://songdna:songdna@postgres:5432/songdna
      PORT: 4000
      LLM_PROVIDER: ${LLM_PROVIDER:-auto}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-opus-4-8}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-flash-latest}
      MAX_AUDIO_UPLOAD_BYTES: ${MAX_AUDIO_UPLOAD_BYTES:-20971520}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  web:
    build:
      context: ./apps/web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  songdna_pgdata:
