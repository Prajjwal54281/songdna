# Render Blueprint — deploys the whole stack (Postgres + API + web) from one
# file. In the Render dashboard: New -> Blueprint -> point at this repo ->
# Render reads this file and provisions everything below.
#
# Two env vars are marked `sync: false` (LLM key, and the web app's API URL)
# because they either shouldn't be committed (a secret) or aren't known until
# the API service exists (its assigned public URL). Set both manually in the
# dashboard after the first deploy — see README.md "Deploying to Render".

databases:
  - name: songdna-db
    plan: free

services:
  - type: web
    name: songdna-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: ./apps/api
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: songdna-db
          property: connectionString
      - key: PORT
        value: 4000
      - key: LLM_PROVIDER
        value: auto
      - key: GEMINI_MODEL
        value: gemini-flash-latest
      - key: ANTHROPIC_MODEL
        value: claude-opus-4-8
      - key: MAX_AUDIO_UPLOAD_BYTES
        value: "20971520"
      # Set at least one of these two in the dashboard after first deploy —
      # the free Gemini key from aistudio.google.com/apikey is the
      # budget-conscious default this project is built around.
      - key: GEMINI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

  - type: web
    name: songdna-web
    runtime: docker
    dockerfilePath: ./apps/web/Dockerfile
    dockerContext: ./apps/web
    plan: free
    envVars:
      # Set after songdna-api's first deploy, once you know its assigned
      # public URL (e.g. https://songdna-api.onrender.com/api) — see README.
      - key: NEXT_PUBLIC_API_URL
        sync: false
