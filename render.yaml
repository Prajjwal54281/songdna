# Render Blueprint — deploys Postgres + the API from one file. The web app
# deploys separately to Vercel (its ideal host for a Next.js app) — see
# README.md "Deploying" for the full split and exact steps.
#
# GEMINI_API_KEY / ANTHROPIC_API_KEY are marked `sync: false` since secrets
# shouldn't be committed — set at least one manually in the dashboard after
# the first deploy.

databases:
  - name: songdna-db
    plan: free

services:
  - type: web
    name: songdna-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: ./apps/api
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: songdna-db
          property: connectionString
      - key: PORT
        value: 4000
      - key: LLM_PROVIDER
        value: auto
      - key: GEMINI_MODEL
        value: gemini-flash-latest
      - key: ANTHROPIC_MODEL
        value: claude-opus-4-8
      - key: MAX_AUDIO_UPLOAD_BYTES
        value: "20971520"
      - key: GEMINI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
